<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transaction Log - LPGChain</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="navbar">
  <h2>LPGChain</h2>
  <div>
    <a href="admin.html">Admin</a>
    <a href="distributor.html">Distributor</a>
    <a href="customer.html">Customer</a>
    <a href="transactions.html">Transactions</a>
    <a href="login.html">Logout</a>
  </div>
</div>

<div class="container">
<h1>🔗 Blockchain Transaction Ledger</h1>
<p style="color: gray;">
  Immutable record of LPG allocation and delivery
</p>
  <div class="section">
    <table>
      <tr>
        <th>Txn ID</th>
        <th>Type</th>
        <th>From</th>
        <th>To</th>
        <th>Quantity</th>
        <th>Timestamp</th>
        <th>Block #</th>
        <th>Hash</th>
      </tr>
      <tbody id="txnTableBody">
        <tr><td colspan="8">Loading transactions...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/api';

  async function loadTransactions() {
    const transactions = await fetch(`${API}/transactions`).then(r => r.json());

    const tbody = document.getElementById('txnTableBody');
    tbody.innerHTML = '';

    transactions.slice(0, 50).forEach(t => {
      const row = document.createElement('tr');
      // Shorten hash to first 16 chars for display
      const shortHash = t.currentHash ? t.currentHash.substring(0, 16) + '...' : '--';
      row.innerHTML = `
        <td>${t.transactionId}</td>
        <td>${t.transactionType}</td>
        <td>${t.fromEntityId}</td>
        <td>${t.toEntityId}</td>
        <td>${t.cylinderCount}</td>
        <td>${t.timestamp}</td>
        <td>${t.blockIndex}</td>
        <td style="font-family:monospace;font-size:11px;">${shortHash}</td>
      `;
      tbody.appendChild(row);
    });
  }

  loadTransactions();
</script>

</body>
</html>
