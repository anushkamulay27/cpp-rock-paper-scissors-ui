<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard - LPGChain</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="navbar">
  <h2>LPGChain</h2>
  <div>
    <a href="admin.html">Admin</a>
    <a href="distributor.html">Distributor</a>
    <a href="customer.html">Customer</a>
    <a href="transactions.html">Transactions</a>
    <a href="login.html">Logout</a>
  </div>
</div>
  <div class="container">
    <h1>Customer Dashboard</h1>

    <div class="card-grid">
      <div class="card">
        <h3>Booking Status</h3>
        <p id="statBooking">Loading...</p>
      </div>
      <div class="card">
        <h3>Total Customers</h3>
        <p id="statCustomers">Loading...</p>
      </div>
      <div class="card">
        <h3>Active Connections</h3>
        <p id="statActive">Loading...</p>
      </div>
    </div>

    <div class="section">
      <h2>Book LPG Cylinder</h2>
      <input type="text" placeholder="Customer Name">
      <select id="distributorSelect">
        <option value="">Select Distributor</option>
      </select>
      <button>Book Now</button>
    </div>

    <div class="section">
      <h2>Raise Complaint</h2>
      <textarea rows="4" placeholder="Write your complaint here..."></textarea>
      <button>Submit Complaint</button>
    </div>

    <div class="section">
      <h2>Customer Records</h2>
      <table>
        <tr>
          <th>Name</th>
          <th>Mobile</th>
          <th>Area</th>
          <th>Cylinder Type</th>
          <th>Subsidy Status</th>
        </tr>
        <tbody id="customerTableBody">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

<script>
  const API = 'http://localhost:8080/api';

  async function loadData() {
    // Load customers
    const customers = await fetch(`${API}/customers`).then(r => r.json());

    // Stats
    const total = customers.length;
    const active = customers.filter(c => c.subsidyStatus === 'Active').length;
    const pending = customers.filter(c => c.subsidyStatus === 'Pending').length;

    document.getElementById('statBooking').textContent = pending + ' Pending';
    document.getElementById('statCustomers').textContent = total;
    document.getElementById('statActive').textContent = active;

    // Customer table — show first 20
    const tbody = document.getElementById('customerTableBody');
    tbody.innerHTML = '';
    customers.slice(0, 20).forEach(c => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${c.name}</td>
        <td>${c.mobileNumber}</td>
        <td>${c.areaName}</td>
        <td>${c.cylinderType}</td>
        <td>${c.subsidyStatus}</td>
      `;
      tbody.appendChild(row);
    });

    // Load distributors into dropdown
    const distributors = await fetch(`${API}/distributors`).then(r => r.json());
    const select = document.getElementById('distributorSelect');
    distributors.forEach(d => {
      const option = document.createElement('option');
      option.value = d.distributorId;
      option.textContent = `${d.name} — ${d.areaCovered}`;
      select.appendChild(option);
    });
  }

  loadData();
</script>

</body>
</html>
